<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>200 SaaS 2026 — Base de Datos Estratégica</title>
<style>
:root{--bg:#f0f4f8;--card:#fff;--primary:#0f172a;--accent:#6366f1;--green:#059669;--green-bg:#d1fae5;--yellow:#b45309;--yellow-bg:#fef3c7;--gray:#64748b;--gray-bg:#f1f5f9;--border:#e2e8f0;--red:#dc2626;--red-bg:#fee2e2;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--primary);font-size:14px;line-height:1.5;}
/* HEADER */
.hdr{background:linear-gradient(135deg,#0f172a,#1e3a5f,#312e81);color:#fff;padding:36px 40px 28px;}
.hdr h1{font-size:28px;font-weight:900;letter-spacing:-0.5px;}
.hdr p{color:#a5b4fc;margin-top:6px;font-size:14px;}
.hdr-meta{display:flex;gap:24px;margin-top:18px;}
.hdr-stat{background:rgba(255,255,255,0.1);padding:10px 18px;border-radius:10px;text-align:center;}
.hdr-stat b{display:block;font-size:22px;font-weight:900;color:#fff;}
.hdr-stat span{font-size:11px;color:#a5b4fc;text-transform:uppercase;letter-spacing:0.5px;}
/* FILTERS */
.filters{background:#fff;border-bottom:1px solid var(--border);padding:14px 40px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.filters input,.filters select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--primary);background:#fff;outline:none;}
.filters input{width:240px;}
.filters input:focus,.filters select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,0.1);}
.filters label{font-size:12px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;}
.count-badge{margin-left:auto;background:var(--accent);color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;}
/* TABLE */
.wrap{padding:24px 40px 60px;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.07);}
thead tr{background:var(--primary);}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;user-select:none;white-space:nowrap;}
th:hover{color:#fff;}
th.sorted{color:#a5b4fc;}
th .arr{margin-left:4px;opacity:0.6;}
td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr.idea-row{cursor:pointer;transition:background 0.12s;}
tbody tr.idea-row:hover td{background:#f8faff;}
tbody tr.idea-row.open td{background:#f0f4ff;}
/* SCORE BADGE */
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:44px;padding:4px 10px;border-radius:20px;font-weight:800;font-size:13px;}
.badge.top{background:var(--green-bg);color:#065f46;}
.badge.mid{background:var(--yellow-bg);color:#78350f;}
.badge.low{background:var(--gray-bg);color:var(--gray);}
.cat-tag{background:#e0e7ff;color:#3730a3;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;}
/* SCORE BAR */
.bar-wrap{display:flex;align-items:center;gap:8px;}
.bar{height:6px;background:#e2e8f0;border-radius:3px;flex:1;max-width:80px;}
.bar-fill{height:6px;border-radius:3px;}
.bar-fill.top{background:var(--green);}
.bar-fill.mid{background:#f59e0b;}
.bar-fill.low{background:#94a3b8;}
/* EXPAND ROW */
tr.expand-row td{padding:0;}
.expand-inner{padding:24px 28px;border-top:2px solid var(--accent);background:linear-gradient(to bottom,#f8faff,#fff);}
.expand-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px;}
.expand-meta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;}
.meta-pill{background:var(--gray-bg);padding:6px 14px;border-radius:8px;font-size:12px;}
.meta-pill b{color:var(--primary);font-weight:700;}
.meta-pill span{color:var(--gray);}
/* FODA */
.foda-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-top:0;}
.foda-cell{padding:14px 16px;}
.foda-cell h5{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
.foda-cell ul{padding-left:16px;}
.foda-cell li{font-size:12px;margin-bottom:4px;}
.fc-f{background:#d1fae5;}.fc-f h5{color:#065f46;}
.fc-o{background:#dbeafe;}.fc-o h5{color:#1e40af;}
.fc-d{background:#fef3c7;}.fc-d h5{color:#78350f;}
.fc-a{background:#fee2e2;}.fc-a h5{color:#991b1b;}
/* VERDICT */
.verdict-box{background:linear-gradient(135deg,#312e81,#1e3a5f);color:#fff;padding:14px 18px;border-radius:10px;font-size:13px;font-weight:500;line-height:1.6;margin-top:16px;}
.verdict-box strong{color:#a5b4fc;}
/* SECTION HEADERS */
.expand-sec{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;color:var(--gray);margin-bottom:8px;}
/* NO RESULTS */
.no-results{text-align:center;padding:60px 20px;color:var(--gray);}
.no-results h3{font-size:18px;margin-bottom:8px;}
/* RESPONSIVE */
@media(max-width:900px){
  .hdr{padding:24px 20px 20px;}
  .filters{padding:12px 16px;}
  .wrap{padding:16px 12px 40px;}
  .expand-grid{grid-template-columns:1fr;}
  .foda-grid{grid-template-columns:1fr;}
  .filters input{width:180px;}
}
</style>
</head>
<body>

<div class="hdr">
  <h1>📊 200 SaaS Ideas — 2026 LATAM</h1>
  <p>Base de datos estratégica · Agustín &amp; el Flaco · Scoring 15 criterios / 150 puntos</p>
  <div class="hdr-meta">
    <div class="hdr-stat"><b id="stat-total">200</b><span>Ideas</span></div>

    <div class="hdr-stat"><b id="stat-mid">0</b><span>Mid (100-114)</span></div>

<div class="filters">

    <option>Salud</option>
    <option>Real Estate</option>

    <option>Agro</option>
    <option>Turismo</option>

    <option>Agentes Autónomos</option>

    <option>Video IA</option>
    <option>Bienestar Mental</option>
    <option>Creatividad IA</option>

  <span class="count-badge" id="visible-count">100 ideas</span>
</div>

<div class="wrap">
  <table id="main-table">
    <thead>
      <tr>
        <th onclick="sortBy('id')">#<span class="arr">↕</span></th>
        <th onclick="sortBy('nombre')">Idea<span class="arr">↕</span></th>
        <th onclick="sortBy('cat')">Categoría<span class="arr">↕</span></th>
        <th onclick="sortBy('score')">Score<span class="arr">↕</span></th>
        <th onclick="sortBy('mvp')">MVP<span class="arr">↕</span></th>
        <th onclick="sortBy('ticket')">Ticket USD<span class="arr">↕</span></th>
        <th>Validado en</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="no-results" id="no-results" style="display:none">
    <h3>Sin resultados</h3>
    <p>Probá ajustando los filtros de búsqueda.</p>
  </div>
</div>

function tierLabel(t){return t==='top'?'Top':(t==='mid'?'Mid':'Bajo');}
function tierClass(t){return t;}
function pct(s){return Math.round((s/150)*100);}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const tier = document.getElementById('tier-filter').value;

  let filtered = IDEAS.filter(i=>{
    if(q && !i.nombre.toLowerCase().includes(q) && !i.desc.toLowerCase().includes(q)) return false;
    if(cat && i.cat !== cat) return false;
    if(tier && i.tier !== tier) return false;
    return true;
  });

  filtered.sort((a,b)=>{
    let av=a[sortKey], bv=b[sortKey];
    if(typeof av==='string') return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    return sortAsc ? av-bv : bv-av;
  });

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  document.getElementById('visible-count').textContent = filtered.length + ' ideas';
  document.getElementById('no-results').style.display = filtered.length ? 'none' : 'block';
  document.getElementById('main-table').style.display = filtered.length ? '' : 'none';

  document.getElementById('stat-total').textContent = IDEAS.length;
  const tops = IDEAS.filter(i=>i.tier==='top').length;
  const mids = IDEAS.filter(i=>i.tier==='mid').length;
  const lows = IDEAS.filter(i=>i.tier==='low').length;
  document.getElementById('stat-top').textContent = tops;
  document.getElementById('stat-mid').textContent = mids;
  document.getElementById('stat-low').textContent = lows;

  filtered.forEach(idea=>{
    const tr = document.createElement('tr');
    tr.className = 'idea-row' + (openId===idea.id ? ' open' : '');
    tr.setAttribute('data-id', idea.id);
    tr.innerHTML = `
      <td><span style="color:#94a3b8;font-size:12px;font-weight:700;">#${idea.id}</span></td>
      <td>
        <div style="font-weight:700;font-size:14px;margin-bottom:3px;">${idea.nombre}</div>
        <div style="font-size:12px;color:#64748b;line-height:1.4;">${idea.desc}</div>
      </td>
      <td><span class="cat-tag">${idea.cat}</span></td>
      <td>
        <div class="bar-wrap">
          <span class="badge ${idea.tier}">${idea.score}</span>
          <div class="bar"><div class="bar-fill ${idea.tier}" style="width:${pct(idea.score)}%"></div></div>
        </div>
      </td>
      <td style="font-weight:600;">${idea.mvp} ${idea.mvp===1?'mes':'meses'}</td>
      <td style="font-weight:600;">${idea.ticket===0?'Comisión':'$'+idea.ticket+'/mes'}</td>
      <td style="font-size:12px;color:#64748b;">${idea.val}</td>
    `;
    tr.addEventListener('click', ()=>toggleExpand(idea, tr));
    tbody.appendChild(tr);

    if(openId===idea.id){
      const exp = document.createElement('tr');
      exp.className = 'expand-row';
      exp.innerHTML = `<td colspan="7"><div class="expand-inner">${buildExpand(idea)}</div></td>`;
      tbody.appendChild(exp);
    }
  });
}

function buildExpand(i){
  return `
    <div class="expand-meta">
      <div class="meta-pill"><b>Score</b> <span>${i.score} / 150 pts (${pct(i.score)}%)</span></div>
      <div class="meta-pill"><b>Tier</b> <span>${tierLabel(i.tier)}</span></div>
      <div class="meta-pill"><b>MVP</b> <span>${i.mvp} ${i.mvp===1?'mes':'meses'}</span></div>
      <div class="meta-pill"><b>Ticket</b> <span>${i.ticket===0?'Comisión / CPA':'$'+i.ticket+' USD/mes'}</span></div>
      <div class="meta-pill"><b>Validado en</b> <span>${i.val}</span></div>
    </div>
    <div class="expand-grid">
      <div>
        <div class="expand-sec">Análisis FODA</div>
        <div class="foda-grid">
          <div class="foda-cell fc-f"><h5>✅ Fortalezas</h5><ul>${i.f.map(x=>'<li>'+x+'</li>').join('')}</ul></div>
          <div class="foda-cell fc-o"><h5>🚀 Oportunidades</h5><ul>${i.o.map(x=>'<li>'+x+'</li>').join('')}</ul></div>
          <div class="foda-cell fc-d"><h5>⚠️ Debilidades</h5><ul>${i.d.map(x=>'<li>'+x+'</li>').join('')}</ul></div>
          <div class="foda-cell fc-a"><h5>🔴 Amenazas</h5><ul>${i.a.map(x=>'<li>'+x+'</li>').join('')}</ul></div>
        </div>
      </div>
      <div style="grid-column:span 2;">
        <div class="expand-sec">Veredicto estratégico</div>
        <div class="verdict-box">${i.vd}</div>
      </div>
    </div>
  `;
}

function toggleExpand(idea, tr){
  if(openId===idea.id){
    openId=null;
  } else {
    openId=idea.id;
  }
  render();
  if(openId===idea.id){
    setTimeout(()=>{
      const rows = document.querySelectorAll('.expand-row');
      if(rows.length) rows[rows.length-1].scrollIntoView({behavior:'smooth',block:'nearest'});
    },50);
  }
}

function sortBy(key){
  if(sortKey===key){ sortAsc=!sortAsc; } else { sortKey=key; sortAsc=false; }
  render();
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('cat-filter').addEventListener('change', render);
document.getElementById('tier-filter').addEventListener('change', render);

render();
</script>
</body>
</html>
